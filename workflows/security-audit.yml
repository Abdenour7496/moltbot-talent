# Multi-Agent Security Audit Workflow
#
# Inspired by the Antfarm project (https://github.com/snarktank/antfarm)
# Adapted for Moltbot Talent enterprise security workflows.

id: security-audit
name: Security Audit & Remediation Pipeline
version: 1
description: |
  Security vulnerability scanning and remediation pipeline.
  Security Auditor scans the codebase for vulnerabilities and prioritizes findings.
  Developer implements each fix with regression tests.
  Security Auditor verifies each fix with bypass testing.
  Code Reviewer performs final review before PR.

agents:
  - id: scanner
    name: Security Auditor (Scanner)
    role: scanning
    description: Comprehensive security vulnerability scanning and analysis.
    persona: security-auditor

  - id: prioritizer
    name: Security Auditor (Prioritizer)
    role: analysis
    description: Deduplicates, ranks, and groups findings into a fix plan.
    persona: security-auditor

  - id: fixer
    name: Developer (Security Fixer)
    role: coding
    description: Implements targeted security fixes with regression tests.

  - id: verifier
    name: Security Auditor (Verifier)
    role: verification
    description: Verifies each fix with bypass testing and regression test validation.
    persona: security-auditor

  - id: tester
    name: Tester
    role: testing
    description: Final integration testing and audit re-run after all fixes.

  - id: reviewer
    name: Code Reviewer
    role: analysis
    description: Reviews the security fix PR for quality and correctness.
    persona: code-reviewer

steps:
  - id: scan
    agent: scanner
    input: |
      Perform a comprehensive security audit of the codebase.

      TASK:
      {{task}}

      Instructions:
      1. Explore the codebase — understand the stack, framework, dependencies
      2. Run dependency audit (npm audit or equivalent)
      3. Scan for hardcoded secrets: API keys, passwords, tokens, private keys
      4. Check for .env files committed to the repo
      5. Scan for common vulnerabilities:
         - SQL injection (raw queries, string concatenation in queries)
         - XSS (unescaped user input in templates/responses)
         - CSRF (missing CSRF tokens on state-changing endpoints)
         - Auth bypass (missing auth middleware, broken access control)
         - Directory traversal (user input in file paths)
         - SSRF (user-controlled URLs in server-side requests)
         - Insecure deserialization
         - Missing input validation on API endpoints
      6. Review auth/session handling (token expiry, session fixation, cookie flags)
      7. Check security headers (CORS, CSP, HSTS, X-Frame-Options)
      8. Document every finding with severity, file, line, and description

      Reply with:
      STATUS: done
      REPO: /path/to/repo
      VULNERABILITY_COUNT: number
      FINDINGS: detailed list of each vulnerability
    expects: "STATUS: done"
    max_retries: 2
    on_fail:
      escalate_to: human

  - id: prioritize
    agent: prioritizer
    input: |
      Prioritize and group the security findings into a fix plan.

      VULNERABILITY_COUNT: {{vulnerability_count}}
      FINDINGS: {{findings}}

      Instructions:
      1. Deduplicate findings (same root cause = one fix)
      2. Group related issues
      3. Rank by: exploitability × impact (critical > high > medium > low)
      4. Create a prioritized fix plan — max 20 fixes
      5. Note any deferred items with justification

      Each fix story must have:
      - id: "fix-001", "fix-002", etc.
      - title: brief description of the fix
      - description: what vulnerability it addresses, affected files
      - acceptance_criteria: including "Vulnerability is no longer exploitable" and "Regression test passes"
      - severity: critical|high|medium|low

      Reply with:
      STATUS: done
      FIX_PLAN: ordered list of fixes with severity
      CRITICAL_COUNT: number
      HIGH_COUNT: number
      DEFERRED: any issues skipped and why
      STORIES_JSON: [ ... array of story objects ... ]
    expects: "STATUS: done"
    max_retries: 2
    on_fail:
      escalate_to: human

  - id: fix
    agent: fixer
    type: loop
    loop:
      over: stories
      completion: all_done
      fresh_session: true
      verify_each: true
      verify_step: verify
    input: |
      Implement a security fix. You are working on ONE fix in a fresh session.

      REPO: {{repo}}
      CURRENT STORY:
      {{current_story}}

      COMPLETED STORIES:
      {{completed_stories}}

      VERIFY FEEDBACK (if retrying):
      {{verify_feedback}}

      Instructions:
      1. Implement the fix — minimal, targeted changes only
      2. Write a regression test that verifies the vulnerability is patched
      3. Run build to verify it passes
      4. Run tests to verify all pass
      5. Commit: fix(security): brief description

      Reply with:
      STATUS: done
      CHANGES: what was fixed
      REGRESSION_TEST: what test was added
    expects: "STATUS: done"
    max_retries: 2
    on_fail:
      escalate_to: human

  - id: verify
    agent: verifier
    input: |
      Verify the security fix is correct and the vulnerability is patched.

      REPO: {{repo}}
      CHANGES: {{changes}}
      REGRESSION_TEST: {{regression_test}}
      CURRENT STORY:
      {{current_story}}

      Instructions:
      1. Run the full test suite
      2. Confirm the regression test exists and tests the right thing
      3. Review the fix — does it actually address the vulnerability?
      4. Check for unintended side effects

      Bypass testing — think like an attacker:
      - SQL Injection: Does it handle all query patterns?
      - XSS: Does sanitization cover all output contexts?
      - Path traversal: URL-encoded sequences? Null bytes? Double encoding?
      - Auth bypass: All HTTP methods covered?
      - CSRF: Token validated server-side?

      Reply with:
      STATUS: done
      VERIFIED: what was confirmed

      Or if issues found:
      STATUS: retry
      ISSUES: what's wrong or incomplete
    expects: "STATUS: done"
    on_fail:
      retry_step: fix
      max_retries: 3
      on_exhausted:
        escalate_to: human

  - id: test
    agent: tester
    input: |
      Final integration testing after all security fixes.

      REPO: {{repo}}
      CHANGES: {{changes}}
      VULNERABILITY_COUNT: {{vulnerability_count}}

      Instructions:
      1. Run the full test suite — all tests must pass
      2. Run the build — must succeed
      3. Re-run dependency audit — compare before/after
      4. Smoke test: does the app still start and work?
      5. Verify no regressions from the security fixes

      Reply with:
      STATUS: done
      RESULTS: test outcomes
      AUDIT_AFTER: remaining audit issues if any

      Or if issues found:
      STATUS: retry
      FAILURES: what's broken
    expects: "STATUS: done"
    on_fail:
      retry_step: fix
      max_retries: 2
      on_exhausted:
        escalate_to: human

  - id: review
    agent: reviewer
    input: |
      Review the security fixes pull request.

      VULNERABILITY_COUNT: {{vulnerability_count}}
      FINDINGS: {{findings}}
      FIX_PLAN: {{fix_plan}}
      CHANGES: {{changes}}
      RESULTS: {{results}}

      Review for:
      - Fix quality and correctness
      - Regression test quality
      - No unintended side effects
      - Follows project conventions
      - Fixes are minimal and targeted

      Reply with:
      STATUS: done
      DECISION: approved

      Or if changes needed:
      STATUS: retry
      DECISION: changes_requested
      FEEDBACK: what needs to change
    expects: "STATUS: done"
    on_fail:
      retry_step: fix
      max_retries: 2
      on_exhausted:
        escalate_to: human
